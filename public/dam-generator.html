<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>向家坝 3D 模型生成器</title>
<style>body{margin:0;background:#1a1a2e;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;padding:20px}h1{font-size:18px;margin:8px}p{color:#94a3b8;font-size:12px;margin:4px 0 16px}canvas{width:800px;height:500px;border-radius:10px;border:1px solid #333}button{margin-top:16px;padding:12px 32px;font-size:15px;font-weight:600;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer}button:hover{background:#2563eb}#status{margin-top:8px;font-size:12px;color:#94a3b8}</style></head><body>
<h1>向家坝混凝土重力坝 · 3D 模型</h1>
<p>拖拽旋转查看 → 点击下载 .glb 文件</p>
<div id="container"></div>
<button onclick="downloadGLB()">⬇ 下载 glb 模型</button>
<div id="status"></div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js'

const W=800,H=500
const scene=new THREE.Scene();scene.background=new THREE.Color('#1a1a2e')
scene.fog=new THREE.Fog('#1a1a2e',30,90)

const camera=new THREE.PerspectiveCamera(45,W/H,1,160)
camera.position.set(20,12,22);camera.lookAt(0,2,0)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(W,H);renderer.shadowMap.enabled=true
document.getElementById('container').appendChild(renderer.domElement)

new OrbitControls(camera,renderer.domElement).update()

// 灯光
scene.add(new THREE.DirectionalLight('#fffef5',3).translateY(25).translateX(20).translateZ(15))
scene.add(new THREE.AmbientLight('#bcd4f0',0.6))
scene.add(new THREE.HemisphereLight('#87ceeb','#556b2f',0.3))

// ══════ 地面 ══════
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.MeshStandardMaterial({color:'#a0a8b0',roughness:0.85}))
gnd.rotation.x=-Math.PI/2;gnd.position.y=-5;gnd.receiveShadow=true;scene.add(gnd)

// ══════ 山体 ══════
const mts=[[-18,8,13,16,'#8a9b7e'],[16,9,11,13,'#7d8e70'],[-22,-10,14,18,'#6e7f62'],[19,-11,12,14,'#728368'],[-10,13,9,10,'#8b9c80'],[11,13,8,9,'#7f9074'],[-25,3,10,12,'#809275'],[24,4,9,11,'#75866a']]
mts.forEach(([x,z,r,h,c])=>{
  const g=new THREE.ConeGeometry(r,h,8,4);g.translate(0,h/2-5,0)
  const m=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:c,roughness:0.7,flatShading:true}))
  m.position.set(x,0,z);m.castShadow=m.receiveShadow=true;scene.add(m)
})

// ══════ 坝体 ══════
const dam=new THREE.Group()
const dm=new THREE.MeshStandardMaterial({color:'#b8bdc4',roughness:0.45,metalness:0.05})

// 下部宽体
const bot=new THREE.Mesh(new THREE.BoxGeometry(16,5.8,3.2),dm);bot.position.y=-2.35
dam.add(bot)

// 上部窄体
const top=new THREE.Mesh(new THREE.BoxGeometry(16,3.0,2.4),dm);top.position.y=2.05
dam.add(top)

// 坝顶路面
const road=new THREE.Mesh(new THREE.PlaneGeometry(16,2.4),new THREE.MeshStandardMaterial({color:'#8a8f95',roughness:0.35}))
road.rotation.x=-Math.PI/2;road.position.y=3.56;dam.add(road)

// 横向结构线
for(let i=-7;i<=7;i+=2){
  const line=new THREE.Mesh(new THREE.BoxGeometry(0.08,5.5,3.25),new THREE.MeshStandardMaterial({color:'#a5aab0',roughness:0.5}))
  line.position.set(i,-2.35,0);dam.add(line)
}

// 坝顶护栏
for(let i=-7.5;i<=7.5;i+=0.4){
  const post=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.5,0.06),new THREE.MeshStandardMaterial({color:'#7a7f85',roughness:0.3}))
  post.position.set(i,3.8,1.1);dam.add(post)
  const post2=post.clone();post2.position.z=-1.1;dam.add(post2)
}

dam.position.set(0,0,-1.2)
dam.children.forEach(c=>{c.castShadow=true;c.receiveShadow=true})
scene.add(dam)

// ══════ 闸门 (8扇) ══════
const gw=1.5,gh=2.5
const gateGroup=new THREE.Group()
for(let i=0;i<8;i++){
  const x=-7+gw/2+i*(gw+0.4)
  // 框
  const frame=new THREE.Mesh(new THREE.BoxGeometry(gw,gh,0.2),new THREE.MeshStandardMaterial({color:'#5a5f65',roughness:0.3,metalness:0.35}))
  frame.position.set(x,2.25,0.1);gateGroup.add(frame)
  // 叶片(半开)
  const lh=gh*0.55
  const leaf=new THREE.Mesh(new THREE.BoxGeometry(gw-0.1,lh,0.12),new THREE.MeshStandardMaterial({color:'#dde0e4',roughness:0.25,metalness:0.5}))
  leaf.position.set(x,2.25+gh/2-lh/2,0.22);gateGroup.add(leaf)
}
dam.add(gateGroup)

// ══════ 发电厂房 ══════
const plant=new THREE.Group()
plant.add(new THREE.Mesh(new THREE.BoxGeometry(14,1.8,2.2),new THREE.MeshStandardMaterial({color:'#d8dce0',roughness:0.4,metalness:0.1})))
for(let i=0;i<7;i++){
  const roof=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.25,2.4),new THREE.MeshStandardMaterial({color:'#a8acb2',roughness:0.25}))
  roof.position.set(-6+i*2,-4.2,0.6);plant.add(roof)
}
plant.position.set(0,-5.1,0.4)
plant.children.forEach(c=>{c.castShadow=true;c.receiveShadow=true})
scene.add(plant)

// ══════ 上下游水面 ══════
const wu=new THREE.Mesh(new THREE.PlaneGeometry(24,16),new THREE.MeshStandardMaterial({color:'#4a8fd4',roughness:0.1,metalness:0.4,transparent:true,opacity:0.7}))
wu.rotation.x=-Math.PI/2;wu.position.set(0,2.5,8);scene.add(wu)
const wd=new THREE.Mesh(new THREE.PlaneGeometry(20,12),new THREE.MeshStandardMaterial({color:'#4a9d7a',roughness:0.1,metalness:0.35,transparent:true,opacity:0.6}))
wd.rotation.x=-Math.PI/2;wd.position.set(0,-3.5,-8);scene.add(wd)

// 动画
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera)}
animate()

// ══════ 导出 GLB ══════
window.downloadGLB=function(){
  document.getElementById('status').textContent='生成中...'
  new GLTFExporter().parse(scene,(gltf)=>{
    const blob=new Blob([gltf instanceof ArrayBuffer?gltf:JSON.stringify(gltf)],{type:gltf instanceof ArrayBuffer?'application/octet-stream':'application/json'})
    const a=document.createElement('a');a.href=URL.createObjectURL(blob)
    a.download='xiangjiaba-dam.glb';a.click()
    document.getElementById('status').textContent='✅ 下载完成！保存到 public/models/ 目录'
  },(e)=>{document.getElementById('status').textContent='❌ 导出失败: '+e.message})
}
</script>
</body></html>
