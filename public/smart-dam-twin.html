const XIANGJIABA = { name:'向家坝水电站',river:'金沙江',crestElevation:384,normalPoolLevel:380,deadLevel:374,floodLimitLevel:380,warningLevel:381.5,downstreamNormalLevel:278.42,normalInflow:1850 };

  {id:'s20',name:'右岸边坡监测',x:30,y:5,z:-18,type:'geological',baseVal:0.3,unit:'mm/day',range:[0.1,5]},
  {id:'s21',name:'泄洪道超声波',x:12,y:3,z:0,type:'flow',baseVal:0,unit:'m/s',range:[0,25]},

];

let sensorStates = SENSOR_DEFS.map(s=>({...s,value:s.baseVal,alert:false,alertLevel:0}));
let systemUptime = 0;
let anomalyCount = 0;

function updateSensorData(elapsed){
  const t = elapsed * 0.001;
  sensorStates.forEach((s,i)=>{
    const noise = (Math.sin(t*0.7+i*1.3)*0.5 + Math.cos(t*1.1+i*0.6)*0.3 + (Math.random()-0.5)*0.4);
    const range = s.range[1]-s.range[0];
    s.value = +(s.baseVal + noise*range*0.025).toFixed(2);
    s.alert=false; s.alertLevel=0;
  });
  // Inject anomalies periodically
  if(Math.sin(t*0.13)>0.72){ let s=sensorStates[5]; s.value=92; s.alert=true; s.alertLevel=2; }
  if(Math.sin(t*0.11+2)>0.75){ let s=sensorStates[22]; s.value=1.75; s.alert=true; s.alertLevel=2; }
  if(Math.sin(t*0.09+1)>0.8){ let s=sensorStates[10]; s.value=4.2; s.alert=true; s.alertLevel=1; }
  if(Math.sin(t*0.14+3)>0.78){ let s=sensorStates[23]; s.value=108; s.alert=true; s.alertLevel=2; }
  anomalyCount = sensorStates.filter(s=>s.alert).length;
  systemUptime = Math.floor(elapsed*0.001);
}

// ===== 3. LIGHTS =====
scene.add(new THREE.AmbientLight(0x2a4058, 0.55));

// ===== 4. TERRAIN =====
function terrainHeight(x,z){
  const rx=(x+8)*0.045, rz=z*0.05;
  const r1=Math.sin(rx*1.4+1.2)*Math.cos(rz*0.7)*12;
  const r2=Math.cos(rx*0.9-0.5)*Math.sin(rz*1.1+0.8)*9;
  const valley = -Math.exp(-z*z*0.006)*3.5 - Math.exp(-(z-8)*(z-8)*0.008)*2;
  const micro = Math.sin(rx*3.5)*Math.cos(rz*2.8)*1.2 + Math.sin(rx*7+rz*5)*0.6;
  let h = 4+r1+r2+valley+micro;
  if(x<-4 && Math.abs(z)<18) h=Math.min(h,3);
  if(Math.abs(x)<10 && Math.abs(z)<26) h=Math.max(0, h-Math.max(0,8-Math.abs(x))*0.8);
  return Math.max(-4,h);
}

const terrainGeo = new THREE.PlaneGeometry(110, 70, 180, 120);
terrainGeo.rotateX(-Math.PI/2);
const tPos = terrainGeo.attributes.position;
for(let i=0;i<tPos.count;i++){
  tPos.setZ(i, terrainHeight(tPos.getX(i), tPos.getY(i)));
}
terrainGeo.computeVertexNormals();
terrainGeo.translate(0,-3,0);

// Clip plane: cut away z > 8
const clipPlanes = [new THREE.Plane(new THREE.Vector3(0,0,-1), 8)];
const terrainTex = createTerrainTexture(1024);
const terrainMat = new THREE.MeshStandardMaterial({

terrainMesh.renderOrder=-1; terrainMesh.name='DEM地形';

// Terrain edges

// ===== 5. CROSS-SECTION CAP =====
const capMat = new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:`varying vec3 vPos;varying vec2 vUv;void main(){vec4 wp=modelMatrix*vec4(position,1.0);vPos=wp.xyz;vUv=uv;gl_Position=projectionMatrix*viewMatrix*wp;}`,
  fragmentShader:`varying vec3 vPos;varying vec2 vUv;uniform float uTime;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
    void main(){float h=vPos.y;float n=noise(vPos.xz*1.5)*0.5+noise(vPos.xz*3.0)*0.3+noise(vPos.xz*7.0)*0.15;vec3 col;
      if(h>7.5)col=mix(vec3(0.42,0.28,0.15),vec3(0.55,0.40,0.22),n);
      else if(h>4.0)col=mix(vec3(0.50,0.38,0.25),vec3(0.60,0.48,0.32),n);
      else if(h>1.5)col=mix(vec3(0.58,0.50,0.38),vec3(0.65,0.55,0.42),n);
      else if(h>-1.0)col=mix(vec3(0.48,0.44,0.40),vec3(0.55,0.50,0.45),n);
      else col=mix(vec3(0.35,0.35,0.38),vec3(0.42,0.40,0.42),n);
      gl_FragColor=vec4(col,1.0);}`,
  side:THREE.DoubleSide
});
const capGeo = new THREE.PlaneGeometry(90,18,1,30);
const capMesh = new THREE.Mesh(capGeo, capMat);

// ===== 7. WATER =====
function createWaterMaterial(opts={}){
  const clr=new THREE.Color(opts.color||0x1a5080);
  const deep=new THREE.Color(opts.deepColor||0x0a2540);
  const gClr=new THREE.Color(opts.gridColor||0x00aaff);
  return new THREE.ShaderMaterial({
    uniforms:{
      uTime:{value:0},uColor:{value:clr},uDeepColor:{value:deep},uOpacity:{value:opts.opacity||0.9},
      uFlowSpeed:{value:opts.flowSpeed||0.8},uSunDir:{value:new THREE.Vector3(0.5,0.35,0.4).normalize()},
      uGridColor:{value:gClr},uGridDensity:{value:opts.gridDensity||1.5},uGridOpacity:{value:opts.gridOpacity||0.2}
    },
    vertexShader:`uniform float uTime;uniform float uFlowSpeed;
      varying vec3 vWorldPos;varying vec3 vNormal;varying vec3 vViewDir;varying float vWave;
      void main(){vec3 pos=position;float t=uTime*uFlowSpeed;
        float w1=sin(pos.x*0.28+t*0.9)*0.38;float w2=cos(pos.z*0.22+t*0.72)*0.28;
        float w3=sin((pos.x*0.45+pos.z*0.35)+t*1.2)*0.18;float w4=cos(pos.x*0.15-pos.z*0.2+t*0.5)*0.12;
        pos.y+=w1+w2+w3+w4;vWave=w1+w2+w3;
        float dx=cos(pos.x*0.28+t*0.9)*0.28*0.38+cos((pos.x*0.45+pos.z*0.35)+t*1.2)*0.45*0.18;
        float dz=-sin(pos.z*0.22+t*0.72)*0.22*0.28+sin((pos.x*0.45+pos.z*0.35)+t*1.2)*0.35*0.18;
        vNormal=normalize(normalMatrix*vec3(-dx,1.0,-dz));
        vec4 wp=modelMatrix*vec4(pos,1.0);vWorldPos=wp.xyz;vViewDir=normalize(cameraPosition-vWorldPos);
        gl_Position=projectionMatrix*viewMatrix*wp;}`,
    fragmentShader:`uniform vec3 uColor;uniform vec3 uDeepColor;uniform float uOpacity;
      uniform vec3 uSunDir;uniform float uTime;uniform vec3 uGridColor;uniform float uGridDensity;uniform float uGridOpacity;
      varying vec3 vWorldPos;varying vec3 vNormal;varying vec3 vViewDir;varying float vWave;
      void main(){vec3 N=normalize(vNormal);vec3 V=normalize(vViewDir);vec3 L=normalize(uSunDir);
        float fresnel=pow(1.0-max(dot(V,N),0.0),4.0);
        vec3 col=mix(uDeepColor,uColor,0.45+vWave*0.12+fresnel*0.25);
        float spec=pow(max(dot(reflect(-L,N),V),0.0),180.0)+pow(max(dot(reflect(-L,N),V),0.0),35.0)*0.5;
        col+=vec3(0.12,0.8,1.0)*spec*0.9;
        vec2 grid=abs(fract(vWorldPos.xz*uGridDensity)-0.5);
        float gridLine=1.0-smoothstep(0.0,0.03,min(grid.x,grid.y));
        col=mix(col,uGridColor,gridLine*uGridOpacity);
        float foam=smoothstep(0.22,0.45,vWave)*0.1;col+=vec3(foam);
        gl_FragColor=vec4(col,uOpacity);}`,
    transparent:true,side:THREE.DoubleSide,depthWrite:true
  });
}

const upstreamWM = createWaterMaterial({color:0x1a5080,deepColor:0x0a2540,opacity:0.94,gridColor:0x00aaff,gridDensity:1.2,gridOpacity:0.18,flowSpeed:0.7});
const upstreamWater = new THREE.Mesh(new THREE.PlaneGeometry(50,40,64,48), upstreamWM);

scene.add(upstreamWater);

const downstreamWM = createWaterMaterial({color:0x124870,deepColor:0x081830,opacity:0.88,gridColor:0x0088cc,gridDensity:1.4,gridOpacity:0.15,flowSpeed:0.9});
const downstreamWater = new THREE.Mesh(new THREE.PlaneGeometry(50,28,64,36), downstreamWM);
downstreamWater.rotation.x=-Math.PI/2; downstreamWater.position.set(26,0.5,0); downstreamWater.name='下游水面'; downstreamWater.receiveShadow=true;
scene.add(downstreamWater);

// Foam zone

function updateSensorVisuals(t){
  sensorMeshes.forEach((mesh,i)=>{
    const state=sensorStates[i]; if(!state) return;
    const mat=mesh.material;
    if(state.alert){
      mat.color.set(state.alertLevel>=2?0xff2244:0xffa502);
      mat.emissive.set(state.alertLevel>=2?0xff2244:0xffa502);
      mat.emissiveIntensity=2.5+Math.sin(t*8+i)*1.5;
    }else{
      mat.color.set(0x22cc88); mat.emissive.set(0x22cc88); mat.emissiveIntensity=1.8;
    }
    mesh.scale.setScalar(1+Math.sin(t*3+i*0.7)*0.08);
  });
  sensorGroup.children.forEach(child=>{
    if(child.name?.startsWith('ring_')){
      const idx=child.userData.parentSensorIndex;
      if(idx!==undefined&&sensorStates[idx]){
        const state=sensorStates[idx];
        child.material.color.set(state.alert?(state.alertLevel>=2?0xff3344:0xffa502):0x22cc88);
        child.material.opacity=0.4+Math.sin(t*5+idx)*0.3;
        child.scale.setScalar(1+Math.sin(t*4+idx)*0.12);
      }
    }
  });
}

function createTerrainTexture(size){
  const canvas=document.createElement('canvas'); canvas.width=canvas.height=size;
  const ctx=canvas.getContext('2d'); const img=ctx.createImageData(size,size);
  for(let y=0;y<size;y++) for(let x=0;x<size;x++){
    const u=x/size,v=y/size;
    const n=fbm2(u*6,v*6,5,12);
    let r,g,b;
    if(n>0.75){r=65;g=82;b=60;}else if(n>0.55){r=35+n*40;g=72+n*58;b=28+n*24;}else{r=40+n*35;g=72+n*48;b=26+n*20;}
    const idx=(y*size+x)*4;
    img.data[idx]=Math.min(255,r);img.data[idx+1]=Math.min(255,g);img.data[idx+2]=Math.min(255,b);img.data[idx+3]=255;
  }
  ctx.putImageData(img,0,0);
  const tex=new THREE.CanvasTexture(canvas); tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.repeat.set(4,4); tex.colorSpace=THREE.SRGBColorSpace;
  return {map:tex};
}
function fbm2(x,y,octaves,seed){let v=0,a=0.5,f=1;for(let i=0;i<octaves;i++){v+=a*hash2d(x*f+seed+i*17.3,y*f+seed+i*13.7);a*=0.48;f*=2.15;}return v;}
function hash2d(x,y){const n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}

const raycaster = new THREE.Raycaster();

function getCanvasCoords(e){
  const rect=webglCanvas.getBoundingClientRect();
  return {mx:((e.clientX-rect.left)/rect.width)*2-1,my:-((e.clientY-rect.top)/rect.height)*2+1,px:e.clientX-rect.left,py:e.clientY-rect.top};
}

webglCanvas.addEventListener('click',(e)=>{
  const {mx,my,px,py}=getCanvasCoords(e);
  mouse.set(mx,my); raycaster.setFromCamera(mouse,camera);
  if(popupData){
    const bx=popupData.x,by=popupData.y,bw=300,bh=180;
    if(px>=bx+bw-35&&px<=bx+bw-5&&py>=by+5&&py<=by+35){popupData=null;return;}
    if(px>=bx&&px<=bx+bw&&py>=by&&py<=by+bh) return;
  }
  const hits=raycaster.intersectObjects(sensorGroup.children.filter(c=>c.name&&!c.name.startsWith('ring_')),true);
  if(hits.length>0){
    let obj=hits[0].object;
    while(obj){
      if(obj.userData?.sensorId){
        const s=sensorStates.find(st=>st.id===obj.userData.sensorId);
        if(s){popupData={name:s.name,detail:s.value+' '+s.unit+' | 范围:'+s.range[0]+'~'+s.range[1]+' '+s.unit+' | 状态:'+(s.alert?'⚠ 告警':'● 正常'),x:Math.min(px,webglCanvas.width-320),y:Math.min(py,webglCanvas.height-200),color:s.alert?'#ff4757':'#00d4ff'};}
        return;
      }
      obj=obj.parent;
    }
    const name=hits[0].object.name;
    if(name&&(name.includes('坝')||name.includes('闸门')||name.includes('厂房')||name.startsWith('pier_'))){

function drawTechBorder(ctx,x,y,w,h,accent){
  ctx.save(); ctx.strokeStyle=accent; ctx.lineWidth=1.5;
  ctx.shadowColor=accent; ctx.shadowBlur=6;
  const cl=14;
  ctx.beginPath();
  ctx.moveTo(x,y+cl);ctx.lineTo(x,y);ctx.lineTo(x+cl,y);
  ctx.moveTo(x+w-cl,y);ctx.lineTo(x+w,y);ctx.lineTo(x+w,y+cl);
  ctx.moveTo(x+w,y+h-cl);ctx.lineTo(x+w,y+h);ctx.lineTo(x+w-cl,y+h);
  ctx.moveTo(x+cl,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+h-cl);
  ctx.stroke();
  ctx.shadowBlur=0;
  ctx.beginPath();ctx.roundRect(x+2,y+2,w-4,h-4,4);ctx.lineWidth=0.8;ctx.globalAlpha=0.45;ctx.stroke();
  ctx.restore();
}

function drawGauge(ctx,cx,cy,r,val,max,label,unit,color,alert){
  ctx.save();
  const ratio=Math.min(1,Math.max(0,val/max));
  const sa=0.75*Math.PI,ea=2.25*Math.PI,sw=ea-sa;
  ctx.beginPath();ctx.arc(cx,cy,r,sa,ea);
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=8;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r,sa,sa+sw*ratio);
  const g=ctx.createLinearGradient(cx-r,cy,cx+r,cy);
  g.addColorStop(0,alert?'#ff4757':color);g.addColorStop(1,alert?'#ffa502':'#3b82f6');
  ctx.strokeStyle=g;ctx.lineWidth=8;ctx.shadowColor=alert?'#ff4757':color;ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
  const pa=sa+sw*ratio;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(pa)*(r-12),cy+Math.sin(pa)*(r-12));
  ctx.strokeStyle=alert?'#ff4757':'#fff';ctx.lineWidth=2.5;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle=alert?'#ff4757':'#fff';ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 15px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText(val.toFixed(1),cx,cy-12);
  ctx.fillStyle='#7a9ab8';ctx.font='10px "Microsoft YaHei"';ctx.fillText(unit,cx,cy+2);
  ctx.fillStyle='#c8ddf0';ctx.font='11px "Microsoft YaHei"';ctx.fillText(label,cx,cy-r-12);
  ctx.restore();
}

function drawRingChart(ctx,cx,cy,r,segments,colors){
  ctx.save();
  const tot=segments.reduce((a,s)=>a+s.value,0)||1;
  let sa=-0.5*Math.PI; const lw=14;
  segments.forEach((seg,i)=>{
    const sw2=(seg.value/tot)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,r,sa,sa+sw2);
    ctx.strokeStyle=colors[i];ctx.lineWidth=lw;ctx.shadowColor=colors[i];ctx.shadowBlur=6;ctx.stroke();
    sa+=sw2;
  });ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(cx,cy,r-lw,0,Math.PI*2);ctx.fillStyle='rgba(6,14,28,0.9)';ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 13px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText(''+tot,cx,cy+4);
  ctx.fillStyle='#7a9ab8';ctx.font='10px "Microsoft YaHei"';ctx.fillText('站点',cx,cy+18);
  segments.forEach((seg,i)=>{
    const ly=cy+r+22+i*16;
    ctx.fillStyle=colors[i];ctx.fillRect(cx-r+4,ly-5,10,10);
    ctx.fillStyle='#c8ddf0';ctx.font='10px "Microsoft YaHei"';ctx.textAlign='left';
    ctx.fillText(seg.label+': '+seg.value,cx-r+20,ly+4);
  });
  ctx.restore();
}
